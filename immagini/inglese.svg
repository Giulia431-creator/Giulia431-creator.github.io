<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-label="Mappa dei concetti di Inglese: inglese tecnico (ESP) e percorso storico-letterario dalla Rivoluzione Industriale all'età moderna">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDF6F0"/>
      <stop offset="1" stop-color="#FAE8E0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#FFFBF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#2C1A1D" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="url(#bg)"/>

  <!-- title -->
  <text x="600" y="60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="600" fill="#2C1A1D">Inglese</text>
  <text x="600" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#7A5C60">Inglese tecnico (ESP) &#183; Percorso storico-letterario</text>

  <!-- ============ TOP PANEL: TECHNICAL ENGLISH ============ -->
  <g filter="url(#soft)"><rect x="40" y="120" width="1120" height="190" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="64" y="156" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">English for Computer Science (ESP)</text>

  <!-- Alan Turing highlight -->
  <g>
    <rect x="64" y="174" width="220" height="112" rx="12" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.8"/>
    <circle cx="108" cy="216" r="22" fill="#C9727A"/>
    <path d="M98 216 h20 M108 206 v20 M101 209 l14 14 M115 209 l-14 14" stroke="#fff" stroke-width="1.6"/>
    <text x="150" y="206" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#A0404A">Alan Turing</text>
    <text x="150" y="226" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Padre dell'informatica</text>
    <text x="150" y="242" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">moderna e dell'IA</text>
    <text x="84" y="272" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Unit 13 &#183; Computer Science</text>
  </g>

  <!-- topic badges -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13.5" font-weight="600">
    <g><rect x="312" y="182" width="190" height="40" rx="20" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="407" y="207" text-anchor="middle" fill="#A0404A">Database &amp; DBMS</text></g>
    <g><rect x="520" y="182" width="200" height="40" rx="20" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="620" y="207" text-anchor="middle" fill="#A0404A">Computer graphics</text></g>
    <g><rect x="738" y="182" width="160" height="40" rx="20" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="818" y="207" text-anchor="middle" fill="#A0404A">Web Apps</text></g>
    <g><rect x="916" y="182" width="180" height="40" rx="20" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="1006" y="207" text-anchor="middle" fill="#A0404A">Web Services</text></g>
    <g><rect x="312" y="234" width="120" height="40" rx="20" fill="#C9727A"/><text x="372" y="259" text-anchor="middle" fill="#fff">IoT</text></g>
    <g><rect x="450" y="234" width="270" height="40" rx="20" fill="#A0404A"/><text x="585" y="259" text-anchor="middle" fill="#fff">Artificial Intelligence</text></g>
    <text x="752" y="259" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#7A5C60">Unit 11 &#183; Unit 15 &#8212; testo tecnico</text>
  </g>

  <!-- ============ BOTTOM PANEL: LITERARY TIMELINE ============ -->
  <g filter="url(#soft)"><rect x="40" y="334" width="1120" height="416" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="64" y="370" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Ambito storico-letterario</text>
  <text x="64" y="391" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#7A5C60">Compact Performer &#183; 1760 &#8594; 1929</text>

  <!-- timeline line -->
  <line x1="100" y1="430" x2="1100" y2="430" stroke="#C9727A" stroke-width="3"/>
  <g fill="#A0404A">
    <circle cx="180" cy="430" r="8"/><circle cx="450" cy="430" r="8"/><circle cx="720" cy="430" r="8"/><circle cx="990" cy="430" r="8"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#A0404A" text-anchor="middle">
    <text x="180" y="418">1760&#8211;1837</text>
    <text x="450" y="418">1837&#8211;1861</text>
    <text x="720" y="418">1861&#8211;1901</text>
    <text x="990" y="418">1901&#8211;1929</text>
  </g>

  <!-- ERA 1: Industrial Revolution -->
  <g>
    <rect x="72" y="456" width="240" height="272" rx="12" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <text x="192" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#A0404A">1st Industrial Revolution</text>
    <!-- steam/factory icon -->
    <g transform="translate(192,520)">
      <rect x="-30" y="-2" width="60" height="34" fill="#C9727A"/>
      <rect x="-22" y="-22" width="12" height="20" fill="#A0404A"/>
      <rect x="-2" y="-30" width="12" height="28" fill="#A0404A"/>
      <circle cx="-16" cy="-30" r="5" fill="#ECD3C9"/><circle cx="-8" cy="-40" r="6" fill="#ECD3C9"/>
    </g>
    <g font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#7A5C60" text-anchor="middle">
      <text x="192" y="576">Steam engine &#183; George III</text>
      <text x="192" y="598">American War of Independence</text>
      <text x="192" y="620">Declaration of Independence</text>
    </g>
    <g><rect x="98" y="638" width="188" height="34" rx="8" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/>
      <text x="192" y="660" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#A0404A">Gothic Fiction</text></g>
    <text x="192" y="698" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">caratteristiche ed esempi</text>
  </g>

  <!-- ERA 2: Victorian Age -->
  <g>
    <rect x="328" y="456" width="240" height="272" rx="12" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <text x="448" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#A0404A">Victorian Age</text>
    <!-- crown icon -->
    <g transform="translate(448,516)">
      <path d="M-26 14 L-26 -6 L-12 6 L0 -14 L12 6 L26 -6 L26 14 Z" fill="#C9727A"/>
      <circle cx="-26" cy="-8" r="4" fill="#A0404A"/><circle cx="0" cy="-16" r="4" fill="#A0404A"/><circle cx="26" cy="-8" r="4" fill="#A0404A"/>
    </g>
    <g font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#7A5C60" text-anchor="middle">
      <text x="448" y="566">2nd Industrial Revolution</text>
      <text x="448" y="588">The Novel: tipologie</text>
    </g>
    <g><rect x="354" y="606" width="188" height="66" rx="10" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.6"/>
      <text x="448" y="628" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#A0404A">Charles Dickens</text>
      <text x="448" y="648" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-style="italic" fill="#7A5C60">Oliver Twist</text>
      <text x="448" y="664" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7A5C60">"I want some more"</text></g>
    <text x="448" y="700" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Early Victorian fiction</text>
  </g>

  <!-- ERA 3: Late Victorian -->
  <g>
    <rect x="584" y="456" width="240" height="272" rx="12" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <text x="704" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#A0404A">Late Victorian Age</text>
    <!-- portrait/frame icon -->
    <g transform="translate(704,520)">
      <rect x="-26" y="-22" width="52" height="44" rx="4" fill="#FAE8E0" stroke="#A0404A" stroke-width="2"/>
      <circle cx="0" cy="-6" r="9" fill="#C9727A"/>
      <path d="M-14 18 a14 12 0 0 1 28 0 z" fill="#C9727A"/>
    </g>
    <g><rect x="610" y="560" width="188" height="34" rx="8" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/>
      <text x="704" y="582" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#A0404A">Aestheticism</text></g>
    <g><rect x="610" y="606" width="188" height="66" rx="10" fill="#A0404A"/>
      <text x="704" y="628" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#fff">Oscar Wilde</text>
      <text x="704" y="650" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic" fill="#FAE8E0">The Picture of</text>
      <text x="704" y="664" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic" fill="#FAE8E0">Dorian Gray</text></g>
    <text x="704" y="700" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">arte per l'arte</text>
  </g>

  <!-- ERA 4: Modern Age -->
  <g>
    <rect x="840" y="456" width="248" height="272" rx="12" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <text x="964" y="484" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#A0404A">Modern Age</text>
    <g font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#7A5C60" text-anchor="middle">
      <text x="964" y="508">Edwardian Age &#183; Britain in the Twenties</text>
    </g>
    <!-- Irish question highlight (Erasmus link) -->
    <g><rect x="866" y="518" width="196" height="32" rx="8" fill="#C9727A"/>
      <text x="964" y="539" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#fff">The Irish Question</text></g>
    <g><rect x="866" y="560" width="196" height="56" rx="10" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/>
      <text x="964" y="580" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#A0404A">War Poets</text>
      <text x="964" y="600" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Rupert Brooke &#8211; <tspan font-style="italic">The Soldier</tspan></text></g>
    <g><rect x="866" y="624" width="196" height="56" rx="10" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/>
      <text x="964" y="644" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#A0404A">James Joyce</text>
      <text x="964" y="664" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-style="italic" fill="#7A5C60">Dubliners</text></g>
    <text x="964" y="702" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#7A5C60">il romanzo e la poesia moderna</text>
  </g>
</svg>
