<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-label="Mappa dei concetti di Sistemi e Reti: progettazione di reti e livelli, sicurezza e crittografia, reti wireless e cellulari, architetture e infrastruttura">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDF6F0"/>
      <stop offset="1" stop-color="#FAE8E0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#FFFBF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#2C1A1D" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A0404A"/>
    </marker>
  </defs>

  <rect width="1200" height="860" fill="url(#bg)"/>

  <!-- title -->
  <text x="600" y="60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="600" fill="#2C1A1D">Sistemi e Reti</text>
  <text x="600" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#7A5C60">Reti &amp; protocolli &#183; Sicurezza &#183; Wireless e cellulari &#183; Architetture</text>

  <!-- ============ PANEL 1: RETI & LIVELLI ============ -->
  <g filter="url(#soft)"><rect x="40" y="120" width="560" height="330" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="64" y="156" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Reti locali e livelli</text>

  <!-- LAN topology: router - switch - PCs -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <!-- internet cloud -->
    <g>
      <ellipse cx="120" cy="210" rx="46" ry="24" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.8"/>
      <text x="120" y="214" text-anchor="middle" fill="#A0404A" font-weight="600">Internet</text>
    </g>
    <!-- router -->
    <g>
      <circle cx="120" cy="290" r="24" fill="url(#panel)" stroke="#A0404A" stroke-width="2"/>
      <path d="M108 290 h24 M120 280 l8 4 -8 4 M120 300 l-8 -4 8 -4" stroke="#A0404A" stroke-width="1.6" fill="none"/>
      <text x="120" y="330" text-anchor="middle" fill="#7A5C60">Router</text>
    </g>
    <!-- switch -->
    <g>
      <rect x="84" y="360" width="72" height="26" rx="5" fill="#C9727A"/>
      <text x="120" y="377" text-anchor="middle" fill="#fff" font-weight="600">Switch</text>
    </g>
    <!-- PCs -->
    <g fill="#FAE8E0" stroke="#C9727A" stroke-width="1.6">
      <rect x="56" y="410" width="34" height="26" rx="3"/><rect x="103" y="410" width="34" height="26" rx="3"/><rect x="150" y="410" width="34" height="26" rx="3"/>
    </g>
    <!-- links -->
    <g stroke="#A0404A" stroke-width="1.8">
      <line x1="120" y1="234" x2="120" y2="266"/>
      <line x1="120" y1="314" x2="120" y2="360"/>
      <line x1="73" y1="386" x2="73" y2="410"/><line x1="120" y1="386" x2="120" y2="410"/><line x1="167" y1="386" x2="167" y2="410"/>
    </g>
    <text x="120" y="430" text-anchor="middle" fill="#7A5C60" font-size="9">DHCP &#183; subnetting</text>
  </g>

  <!-- TCP/UDP + protocols -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="230" y="190" font-size="13" font-weight="600" fill="#A0404A">Livello trasporto</text>
    <g font-size="12">
      <rect x="230" y="200" width="160" height="34" rx="7" fill="#A0404A"/><text x="310" y="222" text-anchor="middle" fill="#fff" font-weight="600">TCP &#183; affidabile</text>
      <rect x="230" y="240" width="160" height="34" rx="7" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.6"/><text x="310" y="262" text-anchor="middle" fill="#A0404A" font-weight="600">UDP &#183; veloce</text>
    </g>
    <text x="230" y="296" font-size="11" fill="#7A5C60">Porte, socket, sliding window</text>
    <text x="230" y="312" font-size="11" fill="#7A5C60">multiplexing / demultiplexing</text>

    <text x="230" y="346" font-size="13" font-weight="600" fill="#A0404A">Livello applicazione</text>
    <g font-family="'Courier New', monospace" font-size="11.5" font-weight="700">
      <g><rect x="230" y="356" width="58" height="26" rx="13" fill="#F4DDD3"/><text x="259" y="373" text-anchor="middle" fill="#A0404A">HTTP</text></g>
      <g><rect x="296" y="356" width="48" height="26" rx="13" fill="#F4DDD3"/><text x="320" y="373" text-anchor="middle" fill="#A0404A">DNS</text></g>
      <g><rect x="352" y="356" width="44" height="26" rx="13" fill="#F4DDD3"/><text x="374" y="373" text-anchor="middle" fill="#A0404A">FTP</text></g>
      <g><rect x="404" y="356" width="62" height="26" rx="13" fill="#F4DDD3"/><text x="435" y="373" text-anchor="middle" fill="#A0404A">SMTP</text></g>
      <g><rect x="230" y="388" width="56" height="26" rx="13" fill="#F4DDD3"/><text x="258" y="405" text-anchor="middle" fill="#A0404A">POP3</text></g>
      <g><rect x="294" y="388" width="56" height="26" rx="13" fill="#F4DDD3"/><text x="322" y="405" text-anchor="middle" fill="#A0404A">IMAP</text></g>
      <g><rect x="358" y="388" width="68" height="26" rx="13" fill="#F4DDD3"/><text x="392" y="405" text-anchor="middle" fill="#A0404A">TELNET</text></g>
    </g>
  </g>

  <!-- VLAN box -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="486" y="178" width="96" height="240" rx="10" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <text x="534" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#A0404A">VLAN</text>
    <g>
      <rect x="500" y="216" width="68" height="22" rx="5" fill="#C9727A"/><text x="534" y="231" text-anchor="middle" font-size="10" fill="#fff">VLAN 10</text>
      <rect x="500" y="244" width="68" height="22" rx="5" fill="#C9727A" fill-opacity="0.6"/><text x="534" y="259" text-anchor="middle" font-size="10" fill="#fff">VLAN 20</text>
      <rect x="500" y="272" width="68" height="22" rx="5" fill="#C9727A" fill-opacity="0.35"/><text x="534" y="287" text-anchor="middle" font-size="10" fill="#A0404A">VLAN 30</text>
    </g>
    <text x="534" y="320" text-anchor="middle" font-size="10" fill="#7A5C60">trunking</text>
    <text x="534" y="334" text-anchor="middle" font-size="10" fill="#7A5C60">802.1q</text>
    <text x="534" y="372" text-anchor="middle" font-size="10.5" fill="#7A5C60">Cisco</text>
    <text x="534" y="386" text-anchor="middle" font-size="10.5" fill="#7A5C60">Packet</text>
    <text x="534" y="400" text-anchor="middle" font-size="10.5" fill="#7A5C60">Tracer</text>
  </g>

  <!-- ============ PANEL 2: SICUREZZA ============ -->
  <g filter="url(#soft)"><rect x="620" y="120" width="540" height="330" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="644" y="156" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Sicurezza &amp; crittografia</text>

  <!-- shield + lock -->
  <g>
    <path d="M712 180 l44 16 v40 c0 34 -22 56 -44 68 c-22 -12 -44 -34 -44 -68 v-40 z" fill="#FAE8E0" stroke="#A0404A" stroke-width="2.2"/>
    <rect x="696" y="232" width="32" height="26" rx="4" fill="#A0404A"/>
    <path d="M702 232 v-8 a10 10 0 0 1 20 0 v8" fill="none" stroke="#A0404A" stroke-width="3"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="11.5">
    <text x="712" y="314" text-anchor="middle" fill="#7A5C60">Riservatezza</text>
    <text x="712" y="330" text-anchor="middle" fill="#7A5C60">Integrità &#183; Autenticazione</text>
  </g>

  <!-- crypto types -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11.5">
    <text x="800" y="190" font-size="13" font-weight="600" fill="#A0404A">Crittografia</text>
    <rect x="800" y="200" width="150" height="30" rx="7" fill="#A0404A"/><text x="875" y="220" text-anchor="middle" fill="#fff" font-weight="600">Simmetrica: AES, DES</text>
    <rect x="800" y="236" width="150" height="30" rx="7" fill="#C9727A"/><text x="875" y="256" text-anchor="middle" fill="#fff" font-weight="600">Asimmetrica: RSA</text>
    <rect x="800" y="272" width="150" height="28" rx="7" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/><text x="875" y="290" text-anchor="middle" fill="#A0404A" font-weight="600">Hashing &#183; Firma digitale</text>
    <text x="875" y="320" text-anchor="middle" font-size="11" fill="#7A5C60">Certificati a chiave pubblica</text>
  </g>

  <!-- security infra badges -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">
    <g><rect x="666" y="356" width="86" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="709" y="376" text-anchor="middle" fill="#A0404A">Firewall</text></g>
    <g><rect x="760" y="356" width="64" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="792" y="376" text-anchor="middle" fill="#A0404A">ACL</text></g>
    <g><rect x="832" y="356" width="104" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="884" y="376" text-anchor="middle" fill="#A0404A">NAT / PAT</text></g>
    <g><rect x="944" y="356" width="64" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="976" y="376" text-anchor="middle" fill="#A0404A">VPN</text></g>
    <g><rect x="666" y="394" width="98" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="715" y="414" text-anchor="middle" fill="#A0404A">SSL / TLS</text></g>
    <g><rect x="772" y="394" width="68" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="806" y="414" text-anchor="middle" fill="#A0404A">Proxy</text></g>
    <g><rect x="848" y="394" width="64" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="880" y="414" text-anchor="middle" fill="#A0404A">DMZ</text></g>
    <g><rect x="920" y="394" width="88" height="30" rx="15" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.6"/><text x="964" y="414" text-anchor="middle" fill="#A0404A">IDS / IPS</text></g>
  </g>

  <!-- ============ PANEL 3: WIRELESS & CELLULARI ============ -->
  <g filter="url(#soft)"><rect x="40" y="470" width="560" height="350" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="64" y="506" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Wireless e reti cellulari</text>

  <!-- access point with waves -->
  <g>
    <rect x="120" y="556" width="44" height="30" rx="5" fill="#C9727A"/>
    <line x1="142" y1="556" x2="142" y2="536" stroke="#A0404A" stroke-width="2"/>
    <g fill="none" stroke="#C9727A" stroke-width="2">
      <path d="M126 532 a22 22 0 0 1 32 0"/>
      <path d="M118 524 a34 34 0 0 1 48 0"/>
      <path d="M110 516 a46 46 0 0 1 64 0"/>
    </g>
    <text x="142" y="604" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Access Point</text>
    <!-- wireless terminals -->
    <g fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5">
      <rect x="74" y="630" width="26" height="38" rx="4"/><rect x="130" y="630" width="26" height="38" rx="4"/><rect x="186" y="630" width="26" height="38" rx="4"/>
    </g>
    <text x="142" y="688" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7A5C60">Wireless terminal</text>
  </g>

  <!-- wifi standards/security -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11.5">
    <text x="250" y="540" font-size="13" font-weight="600" fill="#A0404A">WLAN</text>
    <text x="250" y="560" fill="#7A5C60">SSID &#183; frequenza &#183; crittografia</text>
    <text x="250" y="580" fill="#7A5C60">IEEE 802.11 / .15 / .16 / .20</text>
    <text x="250" y="600" fill="#7A5C60">WEP &#183; WPA / WPA2 &#183; AES &#183; AAA</text>
    <g font-weight="600" font-size="11">
      <g><rect x="250" y="616" width="62" height="24" rx="12" fill="#F4DDD3"/><text x="281" y="632" text-anchor="middle" fill="#A0404A">WPAN</text></g>
      <g><rect x="318" y="616" width="62" height="24" rx="12" fill="#F4DDD3"/><text x="349" y="632" text-anchor="middle" fill="#A0404A">WLAN</text></g>
      <g><rect x="386" y="616" width="64" height="24" rx="12" fill="#F4DDD3"/><text x="418" y="632" text-anchor="middle" fill="#A0404A">WMAN</text></g>
      <g><rect x="456" y="616" width="64" height="24" rx="12" fill="#F4DDD3"/><text x="488" y="632" text-anchor="middle" fill="#A0404A">WWAN</text></g>
    </g>
  </g>

  <!-- cellular 4G/5G -->
  <g font-family="Inter, system-ui, sans-serif">
    <line x1="64" y1="710" x2="576" y2="710" stroke="#ECD3C9" stroke-width="1.5"/>
    <!-- tower -->
    <g stroke="#A0404A" stroke-width="2.2" fill="none">
      <path d="M120 792 l16 -50 M152 792 l-16 -50"/>
      <path d="M120 760 h32 M124 776 h24"/>
    </g>
    <path d="M136 742 l-10 -16 h20 z" fill="#C9727A"/>
    <g fill="none" stroke="#C9727A" stroke-width="1.8">
      <path d="M158 726 a26 26 0 0 1 0 32"/>
      <path d="M170 718 a40 40 0 0 1 0 48"/>
    </g>
    <text x="136" y="810" text-anchor="middle" font-size="11" fill="#7A5C60">eNodeB</text>
    <g font-size="11.5" fill="#7A5C60">
      <text x="250" y="744" font-size="13" font-weight="600" fill="#A0404A">Reti cellulari 4G / 4.5G LTE</text>
      <text x="250" y="766">LTE Access &amp; Core Network</text>
      <text x="250" y="785">MME &#183; HSS &#183; Relay Node</text>
      <text x="250" y="804">Cenni su 5G &#183; MobileIP</text>
    </g>
  </g>

  <!-- ============ PANEL 4: ARCHITETTURE & INFRA ============ -->
  <g filter="url(#soft)"><rect x="620" y="470" width="540" height="350" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="644" y="506" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Architetture e infrastruttura</text>

  <!-- multi-tier -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11.5">
    <text x="644" y="540" font-size="13" font-weight="600" fill="#A0404A">Web multi-tier (client-server)</text>
    <g>
      <rect x="648" y="552" width="96" height="34" rx="7" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.6"/><text x="696" y="574" text-anchor="middle" fill="#A0404A" font-weight="600">Client</text>
      <rect x="760" y="552" width="96" height="34" rx="7" fill="#C9727A"/><text x="808" y="574" text-anchor="middle" fill="#fff" font-weight="600">App Server</text>
      <rect x="872" y="552" width="96" height="34" rx="7" fill="#A0404A"/><text x="920" y="574" text-anchor="middle" fill="#fff" font-weight="600">Database</text>
    </g>
    <g stroke="#A0404A" stroke-width="1.8" fill="none" marker-end="url(#arrow)">
      <line x1="746" y1="569" x2="758" y2="569"/><line x1="858" y1="569" x2="870" y2="569"/>
    </g>
    <text x="808" y="606" text-anchor="middle" fill="#7A5C60">1-tier &#183; 2-tier &#183; 3-tier &#183; N-tier</text>
  </g>

  <!-- cloud -->
  <g font-family="Inter, system-ui, sans-serif">
    <g>
      <path d="M1010 560 a26 26 0 0 1 50 -6 a20 20 0 0 1 14 36 h-58 a22 22 0 0 1 -6 -30 z" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.8"/>
      <text x="1042" y="582" text-anchor="middle" font-size="10.5" fill="#A0404A" font-weight="600">Cloud</text>
    </g>
    <text x="1042" y="612" text-anchor="middle" font-size="10" fill="#7A5C60">IaaS &#183; PaaS &#183; HaaS</text>
  </g>

  <!-- structured cabling -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11.5">
    <line x1="644" y1="636" x2="1136" y2="636" stroke="#ECD3C9" stroke-width="1.5"/>
    <text x="644" y="666" font-size="13" font-weight="600" fill="#A0404A">Cablaggio strutturato</text>
    <!-- patch panel -->
    <g>
      <rect x="648" y="678" width="180" height="34" rx="6" fill="#FDF6F0" stroke="#C9727A" stroke-width="1.5"/>
      <g fill="#C9727A"><rect x="658" y="688" width="12" height="14" rx="2"/><rect x="676" y="688" width="12" height="14" rx="2"/><rect x="694" y="688" width="12" height="14" rx="2"/><rect x="712" y="688" width="12" height="14" rx="2"/><rect x="730" y="688" width="12" height="14" rx="2"/><rect x="748" y="688" width="12" height="14" rx="2"/><rect x="766" y="688" width="12" height="14" rx="2"/><rect x="784" y="688" width="12" height="14" rx="2"/><rect x="802" y="688" width="12" height="14" rx="2"/></g>
    </g>
    <text x="738" y="730" text-anchor="middle" fill="#7A5C60" font-size="10.5">Patch panel &#183; ISO/IEC 11801</text>
  </g>

  <!-- IoT -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="970" y="666" font-size="13" font-weight="600" fill="#A0404A">IoT</text>
    <g>
      <circle cx="900" cy="700" r="14" fill="#A0404A"/>
      <g fill="#FAE8E0" stroke="#C9727A" stroke-width="1.6">
        <circle cx="846" cy="678" r="11"/><circle cx="846" cy="722" r="11"/><circle cx="958" cy="678" r="11"/><circle cx="958" cy="722" r="11"/>
      </g>
      <g stroke="#C9727A" stroke-width="1.6"><line x1="857" y1="682" x2="888" y2="696"/><line x1="857" y1="718" x2="888" y2="704"/><line x1="947" y1="682" x2="914" y2="696"/><line x1="947" y1="718" x2="914" y2="704"/></g>
    </g>
    <text x="902" y="752" text-anchor="middle" font-size="10.5" fill="#7A5C60">Sensori &#183; attuatori &#183; microcontrollori</text>
  </g>

  <!-- VPN tunnel footer in panel4 -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11.5">
    <text x="890" y="792" text-anchor="middle" fill="#7A5C60">VPN site-to-site &amp; remote access &#183; IPsec &#183; Active Directory</text>
  </g>
</svg>
