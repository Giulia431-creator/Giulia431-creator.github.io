<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Mappa dei concetti di Intelligenza Artificiale: Machine Learning classico, Reti neurali e Deep Learning">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDF6F0"/>
      <stop offset="1" stop-color="#FAE8E0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#FFFBF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#2C1A1D" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A0404A"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- title -->
  <text x="600" y="64" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="600" fill="#2C1A1D">Intelligenza Artificiale</text>
  <text x="600" y="98" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#7A5C60">Machine Learning &#183; Reti Neurali &#183; Deep Learning</text>

  <!-- flow arrows between panels -->
  <g stroke="#C9727A" stroke-width="3" fill="none">
    <line x1="392" y1="400" x2="428" y2="400" marker-end="url(#arrow)"/>
    <line x1="772" y1="400" x2="808" y2="400" marker-end="url(#arrow)"/>
  </g>

  <!-- =================== PANEL 1: ML CLASSICO =================== -->
  <g filter="url(#soft)">
    <rect x="40" y="150" width="350" height="500" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/>
  </g>
  <text x="215" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#A0404A">Machine Learning classico</text>

  <!-- features space with clusters (k-means) + decision boundary (SVM) -->
  <g>
    <rect x="78" y="212" width="274" height="180" rx="10" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <!-- axes -->
    <line x1="100" y1="372" x2="330" y2="372" stroke="#C9727A" stroke-width="1.5"/>
    <line x1="100" y1="372" x2="100" y2="230" stroke="#C9727A" stroke-width="1.5"/>
    <!-- decision boundary (SVM) -->
    <line x1="120" y1="368" x2="320" y2="240" stroke="#A0404A" stroke-width="2" stroke-dasharray="6 5"/>
    <!-- cluster A -->
    <g fill="#A0404A">
      <circle cx="150" cy="320" r="6"/><circle cx="170" cy="340" r="6"/><circle cx="135" cy="345" r="6"/>
      <circle cx="185" cy="318" r="6"/><circle cx="160" cy="300" r="6"/>
    </g>
    <!-- cluster B -->
    <g fill="#C9727A">
      <circle cx="250" cy="265" r="6"/><circle cx="278" cy="280" r="6"/><circle cx="262" cy="300" r="6"/>
      <circle cx="295" cy="262" r="6"/><circle cx="240" cy="290" r="6"/>
    </g>
  </g>
  <text x="215" y="416" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#7A5C60">Spazio delle features &#183; k-means &#183; SVM</text>

  <!-- confusion matrix -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12">
    <text x="215" y="452" text-anchor="middle" font-weight="600" fill="#A0404A">Matrice di confusione</text>
    <rect x="150" y="466" width="60" height="50" fill="#A0404A"/>
    <rect x="210" y="466" width="60" height="50" fill="#F4DDD3"/>
    <rect x="150" y="516" width="60" height="50" fill="#F4DDD3"/>
    <rect x="210" y="516" width="60" height="50" fill="#A0404A"/>
    <text x="180" y="496" text-anchor="middle" fill="#fff" font-weight="700">TP</text>
    <text x="240" y="496" text-anchor="middle" fill="#A0404A" font-weight="700">FP</text>
    <text x="180" y="546" text-anchor="middle" fill="#A0404A" font-weight="700">FN</text>
    <text x="240" y="546" text-anchor="middle" fill="#fff" font-weight="700">TN</text>
  </g>
  <text x="215" y="600" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" fill="#7A5C60">Discesa del gradiente &#183; ottimizzazione</text>
  <text x="215" y="622" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" fill="#7A5C60">Supervisionato / non supervisionato</text>

  <!-- =================== PANEL 2: RETI NEURALI =================== -->
  <g filter="url(#soft)">
    <rect x="430" y="150" width="340" height="500" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/>
  </g>
  <text x="600" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#A0404A">Reti Neurali</text>

  <!-- feedforward network -->
  <g stroke="#ECD3C9" stroke-width="1.6">
    <!-- input -> hidden -->
    <line x1="490" y1="270" x2="600" y2="250"/><line x1="490" y1="270" x2="600" y2="330"/><line x1="490" y1="270" x2="600" y2="410"/>
    <line x1="490" y1="350" x2="600" y2="250"/><line x1="490" y1="350" x2="600" y2="330"/><line x1="490" y1="350" x2="600" y2="410"/>
    <line x1="490" y1="430" x2="600" y2="250"/><line x1="490" y1="430" x2="600" y2="330"/><line x1="490" y1="430" x2="600" y2="410"/>
    <!-- hidden -> output -->
    <line x1="600" y1="250" x2="710" y2="350"/><line x1="600" y1="330" x2="710" y2="350"/><line x1="600" y1="410" x2="710" y2="350"/>
  </g>
  <g>
    <circle cx="490" cy="270" r="16" fill="#FAE8E0" stroke="#C9727A" stroke-width="2"/>
    <circle cx="490" cy="350" r="16" fill="#FAE8E0" stroke="#C9727A" stroke-width="2"/>
    <circle cx="490" cy="430" r="16" fill="#FAE8E0" stroke="#C9727A" stroke-width="2"/>
    <circle cx="600" cy="250" r="16" fill="#C9727A"/>
    <circle cx="600" cy="330" r="16" fill="#C9727A"/>
    <circle cx="600" cy="410" r="16" fill="#C9727A"/>
    <circle cx="710" cy="350" r="18" fill="#A0404A"/>
  </g>
  <text x="490" y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#7A5C60">input</text>
  <text x="600" y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#7A5C60">hidden</text>
  <text x="710" y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#7A5C60">output</text>

  <!-- backpropagation arrow -->
  <g>
    <path d="M700 506 H500" fill="none" stroke="#A0404A" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
    <text x="600" y="498" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#A0404A">backpropagation</text>
  </g>
  <text x="600" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" fill="#7A5C60">Neurone artificiale &#183; Percettrone</text>
  <text x="600" y="582" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" fill="#7A5C60">Reti feedforward</text>
  <!-- recurrent loop hint -->
  <g>
    <path d="M560 612 a26 16 0 1 1 80 0" fill="none" stroke="#C9727A" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="600" y="636" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" fill="#7A5C60">Reti ricorrenti</text>
  </g>

  <!-- =================== PANEL 3: DEEP LEARNING =================== -->
  <g filter="url(#soft)">
    <rect x="810" y="150" width="350" height="500" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/>
  </g>
  <text x="985" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#A0404A">Deep Learning</text>

  <!-- CNN: image -> conv blocks -> dense -->
  <g>
    <!-- input image grid -->
    <rect x="838" y="230" width="64" height="64" rx="4" fill="#FDF6F0" stroke="#C9727A" stroke-width="1.5"/>
    <g stroke="#ECD3C9" stroke-width="1">
      <line x1="838" y1="246" x2="902" y2="246"/><line x1="838" y1="262" x2="902" y2="262"/><line x1="838" y1="278" x2="902" y2="278"/>
      <line x1="854" y1="230" x2="854" y2="294"/><line x1="870" y1="230" x2="870" y2="294"/><line x1="886" y1="230" x2="886" y2="294"/>
    </g>
    <rect x="854" y="246" width="16" height="16" fill="#C9727A" fill-opacity="0.6"/>
    <text x="870" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">immagine</text>

    <!-- conv feature maps -->
    <g fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5">
      <rect x="930" y="238" width="44" height="44" rx="3"/>
      <rect x="938" y="246" width="44" height="44" rx="3"/>
      <rect x="946" y="254" width="44" height="44" rx="3"/>
    </g>
    <g fill="#F4DDD3" stroke="#A0404A" stroke-width="1.5">
      <rect x="1020" y="246" width="32" height="32" rx="3"/>
      <rect x="1028" y="254" width="32" height="32" rx="3"/>
      <rect x="1036" y="262" width="32" height="32" rx="3"/>
    </g>
    <!-- dense head -->
    <g fill="#A0404A">
      <circle cx="1110" cy="244" r="9"/><circle cx="1110" cy="270" r="9"/><circle cx="1110" cy="296" r="9"/>
    </g>
    <g stroke="#A0404A" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
      <line x1="906" y1="262" x2="924" y2="262"/>
      <line x1="996" y1="270" x2="1014" y2="270"/>
      <line x1="1074" y1="270" x2="1092" y2="270"/>
    </g>
    <text x="1000" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#A0404A">Reti convoluzionali (CNN)</text>
  </g>

  <!-- MLP block -->
  <g stroke="#ECD3C9" stroke-width="1.4">
    <line x1="900" y1="400" x2="985" y2="380"/><line x1="900" y1="400" x2="985" y2="430"/><line x1="900" y1="400" x2="985" y2="480"/>
    <line x1="900" y1="450" x2="985" y2="380"/><line x1="900" y1="450" x2="985" y2="430"/><line x1="900" y1="450" x2="985" y2="480"/>
    <line x1="985" y1="380" x2="1070" y2="430"/><line x1="985" y1="430" x2="1070" y2="430"/><line x1="985" y1="480" x2="1070" y2="430"/>
  </g>
  <g>
    <circle cx="900" cy="400" r="13" fill="#FAE8E0" stroke="#C9727A" stroke-width="2"/>
    <circle cx="900" cy="450" r="13" fill="#FAE8E0" stroke="#C9727A" stroke-width="2"/>
    <circle cx="985" cy="380" r="13" fill="#C9727A"/>
    <circle cx="985" cy="430" r="13" fill="#C9727A"/>
    <circle cx="985" cy="480" r="13" fill="#C9727A"/>
    <circle cx="1070" cy="430" r="14" fill="#A0404A"/>
  </g>
  <text x="985" y="528" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#A0404A">Multi-Layer Perceptron</text>
  <text x="985" y="582" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" fill="#7A5C60">Riconoscimento immagini</text>
  <text x="985" y="604" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12.5" fill="#7A5C60">(progetto razze canine)</text>
</svg>
