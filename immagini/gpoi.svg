<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" role="img" aria-label="Mappa dei concetti di GPOI: pensiero economico e micro-macroeconomia, economia mista italiana, gestione d'impresa e cloud, gestione e documentazione di progetto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDF6F0"/>
      <stop offset="1" stop-color="#FAE8E0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#FFFBF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#2C1A1D" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A0404A"/>
    </marker>
  </defs>

  <rect width="1200" height="880" fill="url(#bg)"/>

  <!-- title -->
  <text x="600" y="60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="600" fill="#2C1A1D">GPOI &#8212; Gestione Progetto e Organizzazione d'Impresa</text>
  <text x="600" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#7A5C60">Pensiero economico &#183; Economia mista italiana &#183; Gestione d'impresa &#183; Project management</text>

  <!-- ============ PANEL 1: PENSIERO ECONOMICO ============ -->
  <g filter="url(#soft)"><rect x="40" y="120" width="560" height="340" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="64" y="156" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Teoria economica</text>

  <!-- supply/demand cross -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="64" y="176" width="200" height="170" rx="10" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <line x1="86" y1="326" x2="252" y2="326" stroke="#7A5C60" stroke-width="1.5"/>
    <line x1="86" y1="326" x2="86" y2="190" stroke="#7A5C60" stroke-width="1.5"/>
    <!-- demand (down) -->
    <line x1="96" y1="200" x2="244" y2="316" stroke="#A0404A" stroke-width="2.5"/>
    <!-- supply (up) -->
    <line x1="96" y1="316" x2="244" y2="200" stroke="#C9727A" stroke-width="2.5"/>
    <circle cx="170" cy="258" r="5" fill="#2C1A1D"/>
    <text x="248" y="206" font-size="10.5" fill="#C9727A" font-weight="600">O</text>
    <text x="248" y="318" font-size="10.5" fill="#A0404A" font-weight="600">D</text>
    <text x="164" y="350" font-size="10.5" fill="#7A5C60">prezzo di equilibrio</text>
  </g>
  <text x="64" y="372" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#A0404A">Microeconomia</text>
  <text x="64" y="392" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Domanda &#183; offerta &#183; forme di mercato</text>
  <text x="64" y="420" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#A0404A">Macroeconomia</text>
  <text x="64" y="440" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">PIL &#183; inflazione &#183; politica fiscale e monetaria</text>

  <!-- schools timeline + Keynes vs Friedman -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <text x="290" y="190" font-size="12.5" font-weight="600" fill="#A0404A">Storia del pensiero</text>
    <g fill="#7A5C60" font-size="10.5">
      <text x="290" y="210">Aristotele &#183; Mercantilismo</text>
      <text x="290" y="226">Fisiocrazia &#183; Smith (mano invisibile)</text>
      <text x="290" y="242">Marginalismo &#183; Marshall</text>
    </g>
    <!-- two schools -->
    <g>
      <rect x="290" y="256" width="130" height="86" rx="8" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.6"/>
      <text x="355" y="276" text-anchor="middle" font-size="12" font-weight="700" fill="#A0404A">Keynes</text>
      <text x="355" y="296" text-anchor="middle" font-size="10" fill="#7A5C60">Domanda aggregata</text>
      <text x="355" y="311" text-anchor="middle" font-size="10" fill="#7A5C60">Stato interventista</text>
      <text x="355" y="330" text-anchor="middle" font-size="10" fill="#7A5C60">New Deal (1936)</text>
    </g>
    <g>
      <rect x="430" y="256" width="142" height="86" rx="8" fill="#A0404A"/>
      <text x="501" y="276" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Friedman</text>
      <text x="501" y="296" text-anchor="middle" font-size="10" fill="#FAE8E0">Monetarismo</text>
      <text x="501" y="311" text-anchor="middle" font-size="10" fill="#FAE8E0">Stato minimo</text>
      <text x="501" y="330" text-anchor="middle" font-size="10" fill="#FAE8E0">Stagflazione anni '70</text>
    </g>
    <text x="431" y="430" text-anchor="middle" font-size="11" fill="#7A5C60">Interventismo&#160;&#160;vs&#160;&#160;liberismo</text>
    <line x1="355" y1="342" x2="355" y2="356" stroke="#A0404A" stroke-width="1.4"/>
    <line x1="501" y1="342" x2="501" y2="356" stroke="#A0404A" stroke-width="1.4"/>
    <path d="M340 360 H516" stroke="#ECD3C9" stroke-width="1.5" fill="none"/>
  </g>

  <!-- ============ PANEL 2: ECONOMIA MISTA ITALIANA ============ -->
  <g filter="url(#soft)"><rect x="620" y="120" width="540" height="340" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="644" y="156" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Economia mista italiana</text>
  <text x="644" y="178" font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#7A5C60">Lo Stato imprenditore</text>

  <!-- timeline -->
  <g font-family="Inter, system-ui, sans-serif">
    <line x1="664" y1="232" x2="1136" y2="232" stroke="#C9727A" stroke-width="2.5"/>
    <g font-size="11" font-weight="700" fill="#A0404A">
      <circle cx="700" cy="232" r="7" fill="#A0404A"/><text x="700" y="214" text-anchor="middle">1936</text>
      <circle cx="820" cy="232" r="7" fill="#A0404A"/><text x="820" y="214" text-anchor="middle">1948</text>
      <circle cx="940" cy="232" r="7" fill="#A0404A"/><text x="940" y="214" text-anchor="middle">1950-63</text>
      <circle cx="1060" cy="232" r="7" fill="#A0404A"/><text x="1060" y="214" text-anchor="middle">1992</text>
    </g>
    <g font-size="10" fill="#7A5C60" text-anchor="middle">
      <text x="700" y="252">IRI / IMI</text><text x="700" y="265">Legge Banc.</text>
      <text x="820" y="252">Costituzione</text><text x="820" y="265">"keynesiana"</text>
      <text x="940" y="252">Miracolo</text><text x="940" y="265">economico</text>
      <text x="1060" y="252">Crisi &amp;</text><text x="1060" y="265">privatizz.</text>
    </g>
  </g>

  <!-- three models -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <text x="644" y="300" font-size="13" font-weight="600" fill="#A0404A">Modelli economici a confronto</text>
    <g>
      <rect x="664" y="312" width="150" height="34" rx="7" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/><text x="739" y="334" text-anchor="middle" fill="#A0404A" font-weight="600">Mercato (capitalismo)</text>
      <rect x="826" y="312" width="150" height="34" rx="7" fill="#C9727A"/><text x="901" y="334" text-anchor="middle" fill="#fff" font-weight="600">Economia mista</text>
      <rect x="988" y="312" width="148" height="34" rx="7" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/><text x="1062" y="334" text-anchor="middle" fill="#A0404A" font-weight="600">Pianificata</text>
    </g>
    <g fill="#7A5C60" font-size="10.5">
      <text x="644" y="378">Piano Marshall &#183; Cassa per il Mezzogiorno &#183; CEE</text>
      <text x="644" y="396">PMI &#183; distretti industriali &#183; Made in Italy</text>
      <text x="644" y="414">Shock petroliferi &#183; "divorzio" Tesoro&#8211;Bankitalia (1981)</text>
      <text x="644" y="432">Vincolo esterno: SME &#183; Maastricht &#183; Tangentopoli</text>
    </g>
  </g>

  <!-- ============ PANEL 3: IMPRESA & CLOUD ============ -->
  <g filter="url(#soft)"><rect x="40" y="480" width="560" height="360" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="64" y="516" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Gestione d'impresa &amp; Cloud</text>

  <!-- BEP chart -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="64" y="536" width="250" height="200" rx="10" fill="#FDF6F0" stroke="#ECD3C9" stroke-width="1.5"/>
    <line x1="90" y1="716" x2="300" y2="716" stroke="#7A5C60" stroke-width="1.5"/>
    <line x1="90" y1="716" x2="90" y2="552" stroke="#7A5C60" stroke-width="1.5"/>
    <!-- costi fissi (flat) -->
    <line x1="90" y1="676" x2="300" y2="676" stroke="#7A5C60" stroke-width="2" stroke-dasharray="5 4"/>
    <!-- costo totale -->
    <line x1="90" y1="676" x2="300" y2="600" stroke="#C9727A" stroke-width="2.5"/>
    <!-- ricavo -->
    <line x1="90" y1="716" x2="300" y2="566" stroke="#A0404A" stroke-width="2.5"/>
    <!-- BEP point -->
    <circle cx="208" cy="636" r="6" fill="#2C1A1D"/>
    <line x1="208" y1="636" x2="208" y2="716" stroke="#2C1A1D" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="214" y="628" font-size="10.5" font-weight="700" fill="#2C1A1D">BEP</text>
    <text x="305" y="568" font-size="10" fill="#A0404A" font-weight="600">Ricavo</text>
    <text x="305" y="602" font-size="10" fill="#C9727A" font-weight="600">Costo tot.</text>
    <text x="305" y="678" font-size="10" fill="#7A5C60">Costi fissi</text>
  </g>
  <text x="64" y="762" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Costi fissi/variabili &#183; margine di contribuzione</text>
  <text x="64" y="782" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Investimenti &#183; payback &#183; Make or Buy</text>

  <!-- Cloud: CAPEX->OPEX + stack -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="358" y="556" font-size="13" font-weight="600" fill="#A0404A">Cloud computing</text>
    <g font-size="11" font-weight="600">
      <rect x="358" y="566" width="86" height="32" rx="7" fill="#FAE8E0" stroke="#C9727A" stroke-width="1.5"/><text x="401" y="586" text-anchor="middle" fill="#A0404A">CAPEX</text>
      <rect x="486" y="566" width="86" height="32" rx="7" fill="#A0404A"/><text x="529" y="586" text-anchor="middle" fill="#fff">OPEX</text>
      <line x1="446" y1="582" x2="482" y2="582" stroke="#A0404A" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <text x="358" y="618" font-size="10" fill="#7A5C60">dal possesso al noleggio (costi variabili)</text>
    <g font-size="12" font-weight="600">
      <rect x="358" y="632" width="214" height="30" rx="6" fill="#F4DDD3"/><text x="465" y="652" text-anchor="middle" fill="#A0404A">SaaS &#8212; software</text>
      <rect x="358" y="666" width="214" height="30" rx="6" fill="#C9727A" fill-opacity="0.5"/><text x="465" y="686" text-anchor="middle" fill="#A0404A">PaaS &#8212; piattaforma</text>
      <rect x="358" y="700" width="214" height="30" rx="6" fill="#C9727A"/><text x="465" y="720" text-anchor="middle" fill="#fff">IaaS &#8212; infrastruttura</text>
    </g>
    <text x="358" y="752" font-size="10.5" fill="#7A5C60">Scalabilità &#183; economie di scala</text>
    <text x="358" y="770" font-size="10.5" fill="#7A5C60">Vendor lock-in &#183; pubblico / privato / ibrido</text>
  </g>

  <!-- ============ PANEL 4: GESTIONE PROGETTO ============ -->
  <g filter="url(#soft)"><rect x="620" y="480" width="540" height="360" rx="18" fill="url(#panel)" stroke="#ECD3C9" stroke-width="2"/></g>
  <text x="644" y="516" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" fill="#A0404A">Gestione &amp; documentazione di progetto</text>

  <!-- Gantt chart -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="644" y="544" font-size="12.5" font-weight="600" fill="#A0404A">Diagramma di Gantt</text>
    <g font-size="9.5" fill="#7A5C60" text-anchor="end">
      <text x="724" y="566">Avvio</text>
      <text x="724" y="588">Requisiti</text>
      <text x="724" y="610">Progettaz.</text>
      <text x="724" y="632">Sviluppo</text>
      <text x="724" y="654">Testing</text>
    </g>
    <g>
      <rect x="734" y="558" width="80" height="12" rx="3" fill="#A0404A"/>
      <rect x="800" y="580" width="110" height="12" rx="3" fill="#C9727A"/>
      <rect x="890" y="602" width="120" height="12" rx="3" fill="#C9727A"/>
      <rect x="990" y="624" width="120" height="12" rx="3" fill="#C9727A"/>
      <rect x="1090" y="646" width="46" height="12" rx="3" fill="#A0404A"/>
    </g>
    <line x1="734" y1="552" x2="734" y2="664" stroke="#ECD3C9" stroke-width="1"/>
  </g>

  <!-- WBS tree -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="644" y="684" width="60" height="24" rx="5" fill="#A0404A"/><text x="674" y="700" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">WBS</text>
    <g fill="#FAE8E0" stroke="#C9727A" stroke-width="1.4">
      <rect x="624" y="724" width="40" height="20" rx="4"/><rect x="676" y="724" width="40" height="20" rx="4"/>
    </g>
    <g stroke="#C9727A" stroke-width="1.4"><line x1="660" y1="708" x2="644" y2="724"/><line x1="688" y1="708" x2="696" y2="724"/></g>
    <text x="670" y="762" font-size="9.5" fill="#7A5C60" text-anchor="middle">scomposizione</text>
  </g>

  <!-- doc badges -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">
    <g><rect x="760" y="690" width="74" height="28" rx="14" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.5"/><text x="797" y="708" text-anchor="middle" fill="#A0404A">BMC / VPC</text></g>
    <g><rect x="844" y="690" width="64" height="28" rx="14" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.5"/><text x="876" y="708" text-anchor="middle" fill="#A0404A">RACI</text></g>
    <g><rect x="918" y="690" width="86" height="28" rx="14" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.5"/><text x="961" y="708" text-anchor="middle" fill="#A0404A">SRS &#183; FURPS+</text></g>
    <g><rect x="1014" y="690" width="124" height="28" rx="14" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.5"/><text x="1076" y="708" text-anchor="middle" fill="#A0404A">User Stories &#183; RTM</text></g>
    <g><rect x="760" y="726" width="64" height="28" rx="14" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.5"/><text x="792" y="744" text-anchor="middle" fill="#A0404A">UML</text></g>
    <g><rect x="834" y="726" width="98" height="28" rx="14" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.5"/><text x="883" y="744" text-anchor="middle" fill="#A0404A">E-R &#183; API REST</text></g>
    <g><rect x="942" y="726" width="92" height="28" rx="14" fill="#FFFBF8" stroke="#ECD3C9" stroke-width="1.5"/><text x="988" y="744" text-anchor="middle" fill="#A0404A">Test &#183; DoD</text></g>
    <g><rect x="1044" y="726" width="94" height="28" rx="14" fill="#C9727A"/><text x="1091" y="744" text-anchor="middle" fill="#fff">GDPR</text></g>
  </g>
  <text x="644" y="792" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7A5C60">Project Charter &#183; obiettivi SMART &#183; registro dei rischi &#183; preventivo/consuntivo e scostamenti</text>
</svg>
